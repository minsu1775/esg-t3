policies:
  - id: tenant-admin-manage-own-tenant
    description: TENANT_ADMIN은 자기 테넌트 내 사용자·법인을 관리
    effect: PERMIT
    when:
      subject.role: TENANT_ADMIN
      subject.tenantId: "${resource.tenantId}"
      action: [READ, WRITE, APPROVE]
      resource.type: [User, LegalEntity, ActivityData, AuditLog]
    tests:
      - name: TENANT_ADMIN이_자기_테넌트_사용자를_관리한다
        ctx:
          subject: { role: TENANT_ADMIN, tenantId: t1 }
          resource: { type: User, tenantId: t1 }
          action: WRITE
        expect: PERMIT
      - name: TENANT_ADMIN이_다른_테넌트_접근_시_NOT_APPLICABLE
        ctx:
          subject: { role: TENANT_ADMIN, tenantId: t1 }
          resource: { type: User, tenantId: t2 }
          action: READ
        expect: NOT_APPLICABLE
