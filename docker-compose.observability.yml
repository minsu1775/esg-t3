# version: "3.9" 필드는 Compose v2에서 obsolete — 제거 (L3-P0-05 학습)

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    container_name: esg-t3-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    depends_on: [tempo, loki, prometheus]

  tempo:
    image: grafana/tempo:2.7.0
    container_name: esg-t3-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo.yaml:ro
      - ./data/tempo:/tmp/tempo
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki:3.4.0
    container_name: esg-t3-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./data/loki:/tmp/loki
    ports:
      - "3100:3100"

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: esg-t3-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/alerts:/etc/prometheus/alerts:ro
      - ./data/prometheus:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: esg-t3-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./infra/observability/dashboards:/var/lib/grafana/dashboards:ro
      - ./data/grafana:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on: [tempo, loki, prometheus]
